name: Release Plugin\n\non:\n  workflow_dispatch:\n    inputs:\n      new_version:\n        description: 'New plugin version (e.g., 0.3.6)'\n        required: true\n\npermissions:\n  contents: write # Allow the workflow to write to the repository for pushing release.cfg updates\n\njobs:\n  release:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n        with:\n          fetch-depth: 0 # Needed for git operations like push\n          token: ${{ secrets.GITHUB_TOKEN }}\n\n      - name: Set up Python\n        uses: actions/setup-python@v5\n        with:\n          python-version: '3.x'\n\n      - name: Install gh CLI (required for fetching asset URL)\n        run: |\n          sudo apt-get update\n          sudo apt-get install -y gh\n\n      - name: Read current plugin details\n        id: read_config\n        run: |\n          PLUGIN_NAME=$(grep \"NAME=\" loxberry-wmbusmeters-plugin/plugin.cfg | cut -d'=' -f2)\n          PLUGIN_FOLDER=$(grep \"FOLDER=\" loxberry-wmbusmeters-plugin/plugin.cfg | cut -d'=' -f2)\n          echo \"PLUGIN_NAME=$PLUGIN_NAME\" >> \"$GITHUB_OUTPUT\"\n          echo \"PLUGIN_FOLDER=$PLUGIN_FOLDER\" >> \"$GITHUB_OUTPUT\"\n          echo \"Read plugin name: $PLUGIN_NAME, folder: $PLUGIN_FOLDER\"\n\n      - name: Update plugin.cfg with new version\n        run: |\n          NEW_VERSION=\"${{ github.event.inputs.new_version }}\"\n          sed -i \"s/^VERSION=.*/VERSION=$NEW_VERSION/\" loxberry-wmbusmeters-plugin/plugin.cfg\n          echo \"Updated plugin.cfg to version $NEW_VERSION\"\n\n      - name: Create ZIP archive\n        id: create_zip\n        run: |\n          PLUGIN_DIR=\"loxberry-wmbusmeters-plugin\"\n          ZIP_FILE_NAME=\"${{ steps.read_config.outputs.PLUGIN_FOLDER }}-${{ github.event.inputs.new_version }}.zip\"\n          \n          # Create a temporary directory for zipping to exclude unwanted files\n          TEMP_ZIP_DIR=\"temp_plugin_content\"\n          mkdir -p \"$TEMP_ZIP_DIR\"\n          rsync -a \"$PLUGIN_DIR/\" \"$TEMP_ZIP_DIR/$PLUGIN_DIR/\" \\\n            --exclude '.git/' \\\n            --exclude '.github/' \\\n            --exclude '*.pyc' \\\n            --exclude '__pycache__/' \\\n            --exclude '.DS_Store' \\\n            --exclude '.pytest_cache/' \\\n            --exclude '.idea/' \\\n            --exclude '.venv/'\n          \n          # Ensure the base directory of the plugin is included in the zip\n          zip -r \"$ZIP_FILE_NAME\" \"$TEMP_ZIP_DIR/$PLUGIN_DIR\" # zip the content of the plugin folder\n          echo \"ZIP_FILE_PATH=$ZIP_FILE_NAME\" >> \"$GITHUB_OUTPUT\"\n          \n          # Calculate MD5 checksum\n          MD5_CHECKSUM=$(md5sum \"$ZIP_FILE_NAME\" | awk '{print $1}')\n          echo \"MD5_CHECKSUM=$MD5_CHECKSUM\" >> \"$GITHUB_OUTPUT\"\n          echo \"Generated $ZIP_FILE_NAME with MD5: $MD5_CHECKSUM\"\n\n      - name: Create GitHub Release\n        id: create_release\n        uses: softprops/action-gh-release@v1\n        with:\n          tag_name: v${{ github.event.inputs.new_version }}\n          name: Release v${{ github.event.inputs.new_version }} - Automated Features Update\n          body: |\n            Automated release for version ${{ github.event.inputs.new_version }}.\n            \n            **Changes in this release:**\n            - Dynamic N number of sensors in UI.\n            - Full LoxBerry UI scaffolding integration with Perl wrapper and Python content script.\n            - Corrected version display in LoxBerry plugin management.\n\n            Please replace this with detailed release notes for end-users.\n\n            **Assets:**\n            - ${{ steps.create_zip.outputs.ZIP_FILE_PATH }} (MD5: ${{ steps.create_zip.outputs.MD5_CHECKSUM }})\n          files: ${{ steps.create_zip.outputs.ZIP_FILE_PATH }}\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n\n      - name: Get Release Asset URL\n        id: get_asset_url\n        run: |\n          # Construct the direct download URL as per GitHub Releases convention\n          DIRECT_DOWNLOAD_URL=\"https://github.com/${{ github.repository }}/releases/download/v${{ github.event.inputs.new_version }}/${{ steps.create_zip.outputs.ZIP_FILE_PATH }}\"\n          echo \"DIRECT_DOWNLOAD_URL=$DIRECT_DOWNLOAD_URL\" >> \"$GITHUB_OUTPUT\"\n          echo \"Direct download URL: $DIRECT_DOWNLOAD_URL\"\n        env:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed for gh CLI (implicitly)\n\n      - name: Update release.cfg with new release details\n        run: |\n          NEW_VERSION=\"${{ github.event.inputs.new_version }}\"\n          MD5_CHECKSUM=\"${{ steps.create_zip.outputs.MD5_CHECKSUM }}\"\n          DOWNLOAD_URL=\"${{ steps.get_asset_url.outputs.DIRECT_DOWNLOAD_URL }}\"\n          INFO_URL=\"https://github.com/${{ github.repository }}/releases/tag/v${{ github.event.inputs.new_version }}\"\n\n          # Update the release.cfg file in the repository\n          sed -i \"s/^VERSION=.*/VERSION=$NEW_VERSION/\" loxberry-wmbusmeters-plugin/release.cfg\n          sed -i \"s/^MD5=.*/MD5=$MD5_CHECKSUM/\" loxberry-wmbusmeters-plugin/release.cfg\n          sed -i \"s|^\(URL=\).*|\1$DOWNLOAD_URL|\" loxberry-wmbusmeters-plugin/release.cfg\n          sed -i \"s|^\(INFOURL=\).*|\1$INFO_URL|\" loxberry-wmbusmeters-plugin/release.cfg\n          echo \"Updated release.cfg with version $NEW_VERSION, MD5 and URL.\"\n\n      - name: Commit and push changes to release.cfg and plugin.cfg\n        uses: stefanzweifel/git-auto-commit-action@v5\n        with:\n          commit_message: 'ci: Automated release for v${{ github.event.inputs.new_version }}'\n          branch: main # Or your default branch\n          file_pattern: 'loxberry-wmbusmeters-plugin/plugin.cfg loxberry-wmbusmeters-plugin/release.cfg'\n          # Ensure the GITHUB_TOKEN has write permissions. By default, it usually does.\n          # No need for --force, a regular push should work after auto-commit action\n