name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: "New plugin version (e.g., 0.3.6)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-plugin
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      PLUGIN_DIR: loxberry-wmbusmeters-plugin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        run: |
          set -euo pipefail
          VERSION="${{ inputs.new_version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            echo "Expected format: X.Y.Z"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Read current plugin details
        id: read_config
        run: |
          set -euo pipefail
          PLUGIN_NAME="$(grep '^NAME=' "$PLUGIN_DIR/plugin.cfg" | cut -d'=' -f2-)"
          PLUGIN_FOLDER="$(grep '^FOLDER=' "$PLUGIN_DIR/plugin.cfg" | cut -d'=' -f2-)"
          echo "plugin_name=$PLUGIN_NAME" >> "$GITHUB_OUTPUT"
          echo "plugin_folder=$PLUGIN_FOLDER" >> "$GITHUB_OUTPUT"
          echo "Plugin name: $PLUGIN_NAME"
          echo "Plugin folder: $PLUGIN_FOLDER"

      - name: Update plugin.cfg with new version
        run: |
          set -euo pipefail
          NEW_VERSION="${{ inputs.new_version }}"
          sed -i "s/^VERSION=.*/VERSION=$NEW_VERSION/" "$PLUGIN_DIR/plugin.cfg"
          echo "Updated plugin.cfg to version $NEW_VERSION"

      - name: Create ZIP archive
        id: create_zip
        run: |
          set -euo pipefail

          NEW_VERSION="${{ inputs.new_version }}"
          ZIP_FILE_NAME="${{ steps.read_config.outputs.plugin_folder }}-${NEW_VERSION}.zip"
          TEMP_ZIP_DIR="$(mktemp -d)"

          rsync -a "$PLUGIN_DIR/" "$TEMP_ZIP_DIR/$PLUGIN_DIR/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '*.pyc' \
            --exclude '__pycache__/' \
            --exclude '.DS_Store' \
            --exclude '.pytest_cache/' \
            --exclude '.idea/' \
            --exclude '.venv/'

          (
            cd "$TEMP_ZIP_DIR"
            zip -r "$GITHUB_WORKSPACE/$ZIP_FILE_NAME" "$PLUGIN_DIR"
          )

          MD5_CHECKSUM="$(md5sum "$ZIP_FILE_NAME" | awk '{print $1}')"

          echo "zip_file_path=$ZIP_FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "md5_checksum=$MD5_CHECKSUM" >> "$GITHUB_OUTPUT"

          echo "Generated $ZIP_FILE_NAME"
          echo "MD5: $MD5_CHECKSUM"

      - name: Update release.cfg with new release details
        run: |
          set -euo pipefail

          NEW_VERSION="${{ inputs.new_version }}"
          MD5_CHECKSUM="${{ steps.create_zip.outputs.md5_checksum }}"
          ZIP_FILE_NAME="${{ steps.create_zip.outputs.zip_file_path }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${NEW_VERSION}/${ZIP_FILE_NAME}"
          INFO_URL="https://github.com/${{ github.repository }}/releases/tag/v${NEW_VERSION}"

          sed -i "s/^VERSION=.*/VERSION=$NEW_VERSION/" "$PLUGIN_DIR/release.cfg"
          sed -i "s/^MD5=.*/MD5=$MD5_CHECKSUM/" "$PLUGIN_DIR/release.cfg"
          sed -i "s|^URL=.*|URL=$DOWNLOAD_URL|" "$PLUGIN_DIR/release.cfg"
          sed -i "s|^INFOURL=.*|INFOURL=$INFO_URL|" "$PLUGIN_DIR/release.cfg"

          echo "Updated release.cfg"

      - name: Commit and push config changes
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$PLUGIN_DIR/plugin.cfg" "$PLUGIN_DIR/release.cfg"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: release v${{ inputs.new_version }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.new_version }}
          target_commitish: ${{ github.ref_name }}
          name: Release v${{ inputs.new_version }}
          body: |
            Automated release for version ${{ inputs.new_version }}.

            Assets:
            - ${{ steps.create_zip.outputs.zip_file_path }}
            - MD5: ${{ steps.create_zip.outputs.md5_checksum }}
          files: |
            ${{ steps.create_zip.outputs.zip_file_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
