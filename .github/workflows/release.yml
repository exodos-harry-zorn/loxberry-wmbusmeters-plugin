name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      new_version:
        description: "New plugin version (e.g. 0.3.6)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-plugin
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        run: |
          set -euo pipefail
          VERSION="${{ inputs.new_version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $VERSION"
            echo "Expected format: X.Y.Z"
            exit 1
          fi

      - name: Debug repo structure
        run: |
          set -euo pipefail
          pwd
          ls -la

      - name: Install required packages
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y zip rsync

      - name: Read plugin metadata
        id: meta
        run: |
          set -euo pipefail

          if [ ! -f "plugin.cfg" ]; then
            echo "plugin.cfg not found in repository root"
            exit 1
          fi

          PLUGIN_NAME="$(grep '^NAME=' plugin.cfg | tail -n 1 | cut -d'=' -f2-)"
          PLUGIN_FOLDER="$(grep '^FOLDER=' plugin.cfg | cut -d'=' -f2-)"
          CURRENT_VERSION="$(grep '^VERSION=' plugin.cfg | cut -d'=' -f2-)"

          if [ -z "$PLUGIN_NAME" ] || [ -z "$PLUGIN_FOLDER" ] || [ -z "$CURRENT_VERSION" ]; then
            echo "plugin.cfg is missing NAME, FOLDER, or VERSION"
            exit 1
          fi

          echo "plugin_name=$PLUGIN_NAME" >> "$GITHUB_OUTPUT"
          echo "plugin_folder=$PLUGIN_FOLDER" >> "$GITHUB_OUTPUT"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          echo "Plugin: $PLUGIN_NAME"
          echo "Folder: $PLUGIN_FOLDER"
          echo "Current version: $CURRENT_VERSION"

      - name: Ensure tag does not already exist
        run: |
          set -euo pipefail
          TAG="v${{ inputs.new_version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 1
          fi

      - name: Update plugin.cfg version
        run: |
          set -euo pipefail
          NEW_VERSION="${{ inputs.new_version }}"
          sed -i "s/^VERSION=.*/VERSION=$NEW_VERSION/" plugin.cfg
          echo "Updated plugin.cfg to $NEW_VERSION"

      - name: Build release ZIP
        id: zip
        run: |
          set -euo pipefail

          NEW_VERSION="${{ inputs.new_version }}"
          PLUGIN_FOLDER="${{ steps.meta.outputs.plugin_folder }}"
          ZIP_FILE_NAME="${PLUGIN_FOLDER}-${NEW_VERSION}.zip"

          TEMP_DIR="$(mktemp -d)"
          STAGE_DIR="$TEMP_DIR/$PLUGIN_FOLDER"
          mkdir -p "$STAGE_DIR"

          rsync -a ./ "$STAGE_DIR/" \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude "$ZIP_FILE_NAME" \
            --exclude '*.pyc' \
            --exclude '__pycache__/' \
            --exclude '.pytest_cache/' \
            --exclude '.DS_Store' \
            --exclude '.idea/' \
            --exclude '.venv/' \
            --exclude 'node_modules/'

          (
            cd "$TEMP_DIR"
            zip -r "$GITHUB_WORKSPACE/$ZIP_FILE_NAME" "$PLUGIN_FOLDER"
          )

          MD5_CHECKSUM="$(md5sum "$ZIP_FILE_NAME" | awk '{print $1}')"
          SHA256_CHECKSUM="$(sha256sum "$ZIP_FILE_NAME" | awk '{print $1}')"

          echo "zip_file=$ZIP_FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "md5=$MD5_CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256_CHECKSUM" >> "$GITHUB_OUTPUT"

          echo "Created $ZIP_FILE_NAME"
          echo "MD5: $MD5_CHECKSUM"
          echo "SHA256: $SHA256_CHECKSUM"

      - name: Update release.cfg
        run: |
          set -euo pipefail

          NEW_VERSION="${{ inputs.new_version }}"
          ZIP_FILE="${{ steps.zip.outputs.zip_file }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${NEW_VERSION}/${ZIP_FILE}"
          INFO_URL="https://github.com/${{ github.repository }}/releases/tag/v${NEW_VERSION}"

          # Completely rewrite release.cfg to ensure correct format for LoxBerry updater
          echo "[AUTOUPDATE]" > release.cfg
          echo "VERSION=$NEW_VERSION" >> release.cfg
          echo "ARCHIVEURL=$DOWNLOAD_URL" >> release.cfg
          echo "INFOURL=$INFO_URL" >> release.cfg

          # Also create/update prerelease.cfg to prevent 404 errors in LoxBerry updater
          cp release.cfg prerelease.cfg

          echo "Generated release.cfg and prerelease.cfg with VERSION=$NEW_VERSION and ARCHIVEURL=$DOWNLOAD_URL"

      - name: Commit updated config files
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add plugin.cfg release.cfg prerelease.cfg

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: release v${{ inputs.new_version }}"
            git push origin HEAD:main
          fi


      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          EXODOS_API_KEY: op://AI Vault/exodos.ai Production API Key/Credential
          EXODOS_HOST: op://AI Vault/exodos.ai Production API Key/hostname
          EXODOS_INVENTORYROOT_ID: op://AI Vault/exodos.ai Production API Key/inventoryroot_id

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          output-file: loxberry-wmbusmeters-plugin-${{ inputs.new_version }}.cyclonedx.json

      - name: Inject Version and Plugin Dependencies into SBOM
        run: |
          cat << 'PYEOF' > patch_bom.py
          import json
          import sys
          
          file = f"loxberry-wmbusmeters-plugin-{sys.argv[1]}.cyclonedx.json"
          with open(file, "r") as f:
              bom = json.load(f)
          
          main_ref = "pkg:generic/loxberry-wmbusmeters-plugin@" + sys.argv[1]
          
          if "metadata" in bom and "component" in bom["metadata"]:
              bom["metadata"]["component"]["version"] = sys.argv[1]
              bom["metadata"]["component"]["name"] = "loxberry-wmbusmeters-plugin"
              bom["metadata"]["component"]["type"] = "application"
              bom["metadata"]["component"]["bom-ref"] = main_ref
              bom["metadata"]["component"]["purl"] = main_ref
          
          if "components" not in bom:
              bom["components"] = []
              
          extra = [
              {"name": "python3", "type": "library", "purl_base": "pkg:deb/debian/python3"},
              {"name": "mosquitto-clients", "type": "application", "purl_base": "pkg:deb/debian/mosquitto-clients"},
              {"name": "rtl-sdr", "type": "application", "purl_base": "pkg:deb/debian/rtl-sdr"},
              {"name": "wmbusmeters", "type": "application", "purl_base": "pkg:github/wmbusmeters/wmbusmeters"}
          ]
          
          dep_refs = []
          for c in extra:
              c["version"] = "latest"
              c["bom-ref"] = f"{c['purl_base']}@latest"
              c["purl"] = c["bom-ref"]
              del c["purl_base"]
              bom["components"].append(c)
              dep_refs.append(c["bom-ref"])
              
          if "dependencies" not in bom:
              bom["dependencies"] = []
              
          # Check if main component already has a dependency entry
          main_dep = next((d for d in bom["dependencies"] if d["ref"] == main_ref), None)
          if main_dep:
              if "dependsOn" not in main_dep:
                  main_dep["dependsOn"] = []
              main_dep["dependsOn"].extend(dep_refs)
              main_dep["dependsOn"] = list(set(main_dep["dependsOn"])) # deduplicate
          else:
              bom["dependencies"].append({
                  "ref": main_ref,
                  "dependsOn": dep_refs
              })
              
          with open(file, "w") as f:
              json.dump(bom, f, indent=2)
          PYEOF
          python3 patch_bom.py "${{ inputs.new_version }}"


      - name: Upload SBOM to exodos.ai
        run: |
          if [ -z "$EXODOS_INVENTORYROOT_ID" ]; then echo "EXODOS_INVENTORYROOT_ID is empty! Check 1Password field name."; exit 1; fi
          if [ -z "$EXODOS_API_KEY" ]; then echo "EXODOS_API_KEY is empty! Check 1Password field name."; exit 1; fi
          
          echo "Uploading SBOM to https://api.exodos.io/api/v1/boms/inventory/bom/upload"
          
          curl -f -v -X POST "https://api.exodos.io/api/v1/boms/inventory/bom/upload" \
            -H "X-API-Key: $EXODOS_API_KEY" \
            -H "accept: application/json" \
            -F "params={\"inventoryroot_id\": \"$EXODOS_INVENTORYROOT_ID\", \"inventorydisplayname\": \"loxberry-wmbusmeters-plugin\", \"inventoryversion_string\": \"${{ inputs.new_version }}\"}" \
            -F "file=@loxberry-wmbusmeters-plugin-${{ inputs.new_version }}.cyclonedx.json;type=application/json"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.new_version }}
          target_commitish: main
          name: Release v${{ inputs.new_version }}
          body: |
            Automated release for version ${{ inputs.new_version }}.

            Asset:
            - ${{ steps.zip.outputs.zip_file }}

            Checksums:
            - MD5: ${{ steps.zip.outputs.md5 }}
            - SHA256: ${{ steps.zip.outputs.sha256 }}
          files: |
            ${{ steps.zip.outputs.zip_file }}
            loxberry-wmbusmeters-plugin-${{ inputs.new_version }}.cyclonedx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
